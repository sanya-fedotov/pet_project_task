name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── Stage 1: lint ────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: ruff — lint
        run: ruff check app/ tests/

      - name: ruff — format check
        run: ruff format --check app/ tests/

      - name: mypy — type check
        run: mypy app/

  # ── Stage 2: unit + API tests (SQLite, no infra needed) ─────────────────────
  test:
    name: Test (unit + API)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests with coverage
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          SECRET_KEY: ${{ secrets.SECRET_KEY || 'ci-secret-key-not-for-production' }}
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: "30"
          LOCK_TTL_SECONDS: "300"
          METRICS_TOKEN: ""
          CORS_ORIGINS: '["http://localhost"]'
        run: |
          pytest tests/unit/ tests/api/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=75 \
            -v --tb=short

      - name: Upload coverage report to GitHub artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

  # ── Stage 3: integration tests (real PostgreSQL via service container) ───────
  test-integration:
    name: Test (integration — PostgreSQL)
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: botofarm
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD || 'botofarm' }}
          POSTGRES_DB: botofarm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U botofarm -d botofarm_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run integration tests (lock path — testcontainers via Docker socket)
        env:
          # Unit/API fixture overrides use SQLite; testcontainers spins its own
          # Postgres container internally (Docker-in-Docker is available on ubuntu-latest).
          DATABASE_URL: postgresql+asyncpg://botofarm:${{ secrets.DB_PASSWORD || 'botofarm' }}@localhost:5432/botofarm_test
          SECRET_KEY: ${{ secrets.SECRET_KEY || 'ci-secret-key-not-for-production' }}
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: "30"
          LOCK_TTL_SECONDS: "300"
          METRICS_TOKEN: ""
          CORS_ORIGINS: '["http://localhost"]'
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: |
          pytest tests/api/test_lock_pg.py -v --tb=short
