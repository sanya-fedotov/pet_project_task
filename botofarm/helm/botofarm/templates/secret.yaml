apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secret
  labels:
    app: {{ .Release.Name }}
type: Opaque
stringData:
  DATABASE_URL: {{ required "env.DATABASE_URL must be set" .Values.env.DATABASE_URL | quote }}
  SECRET_KEY: {{ required "env.SECRET_KEY must be set via --set or external secrets" .Values.env.SECRET_KEY | quote }}
  METRICS_TOKEN: {{ required "env.METRICS_TOKEN must be set via --set or external secrets" .Values.env.METRICS_TOKEN | quote }}
