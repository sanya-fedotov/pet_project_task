apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secret
  labels:
    app: {{ .Release.Name }}
type: Opaque
stringData:
  DATABASE_URL: {{ required "env.DATABASE_URL must be set" .Values.env.DATABASE_URL | quote }}
  {{- if or (eq .Values.env.SECRET_KEY "") (eq .Values.env.SECRET_KEY "CHANGE_ME_REQUIRED") }}
  {{- fail "env.SECRET_KEY must be set via --set env.SECRET_KEY=... before deploying" }}
  {{- end }}
  SECRET_KEY: {{ .Values.env.SECRET_KEY | quote }}
  METRICS_TOKEN: {{ .Values.env.METRICS_TOKEN | quote }}
