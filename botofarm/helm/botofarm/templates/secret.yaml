apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secret
  labels:
    app: {{ .Release.Name }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.env.DATABASE_URL | quote }}
  SECRET_KEY: {{ .Values.env.SECRET_KEY | quote }}
  METRICS_TOKEN: {{ .Values.env.METRICS_TOKEN | quote }}
