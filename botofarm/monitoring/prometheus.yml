global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    service: botofarm
    environment: local

# Alert rules loaded from the rules/ subdirectory.
rule_files:
  - "rules/*.yml"

# Alertmanager integration — configure when deploying to production.
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: botofarm
    # The /metrics endpoint is protected by a bearer token when METRICS_TOKEN
    # is set in the app environment.  When METRICS_TOKEN is empty (default for
    # local docker-compose), no Authorization header is needed.
    # To enable token auth, uncomment the authorization block below and set
    # credentials to the same value as METRICS_TOKEN in the app's .env file.
    static_configs:
      - targets:
          - app:8000
    metrics_path: /metrics
    # authorization:
    #   credentials: change-me-in-production

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
